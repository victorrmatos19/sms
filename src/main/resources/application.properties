# ============================================================
# ERP Desktop — application.properties
# ============================================================

spring.application.name=ERP Desktop

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ============================================================
# Flyway — migrations automáticas
# ============================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ============================================================
# Datasource — preenchido em runtime pelo EmbeddedPostgresConfig
# (não editar manualmente)
# ============================================================
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# Logs
# ============================================================
logging.level.root=WARN
logging.level.com.erp=INFO
logging.level.org.flywaydb=INFO
logging.file.name=logs/erp.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
